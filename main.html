<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GitHub IT Dashboard</title>
    <!-- tailwind + daisyui -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- font awesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />

    <!-- font -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap"
      rel="stylesheet"
    />

    <style>
      * {
        font-family: "Geist", sans-serif;
      }
    </style>
  </head>
  <body>
    <!-- navbar -->
    <header class="border-b border-gray-300">
      <div class="navbar justify-between bg-base-100 w-11/12 mx-auto">
        <div class="flex justify-center items-center gap-1">
          <img class="w-9" src="./assets/github-logo.png" alt="" />
          <span class="text-2xl font-semibold">GitHub Issues Tracker</span>
        </div>
        <div class="flex gap-4">
          <label class="input">
            <svg
              class="h-[1em] opacity-50"
              xmlns="http://www.w3.org/2000/svg"
              viewBox="0 0 24 24"
            >
              <g
                stroke-linejoin="round"
                stroke-linecap="round"
                stroke-width="2.5"
                fill="none"
                stroke="currentColor"
              >
                <circle cx="11" cy="11" r="8"></circle>
                <path d="m21 21-4.3-4.3"></path>
              </g>
            </svg>
            <input type="search" required placeholder="Search issues..." />
          </label>
          <button class="btn btn-primary">
            <i class="fa-solid fa-plus"></i>New Issue
          </button>
        </div>
      </div>
    </header>
    <!-- main section -->
    <main class="bg-[#F8FAFC] py-15">
      <!-- tabs -->
      <section class="max-w-[1110px] mx-auto">
        <div class="p-6 bg-white rounded-lg flex gap-2 mb-4 shadow">
          <button class="btn btn-primary">All</button>
          <button class="btn">Open</button>
          <button class="btn">Closed</button>
        </div>
        <!-- issues section -->
        <div class="card card-body bg-white shadow">
          <!-- issues des -->
          <div class="flex justify-between mb-5">
            <!-- left -->
            <div class="flex justify-center items-center gap-2">
              <div
                class="w-[50px] h-[50px] bg-[#ECE4FF] flex justify-center items-center rounded-full"
              >
                <img src="./assets/Aperture.png" alt="" />
              </div>
              <div>
                <h3><span id="total">0</span> Issues</h3>
                <p class="text-gray-500">
                  Track and manage your project issues
                </p>
              </div>
            </div>
            <!-- right -->
            <div class="flex gap-4">
              <p class="flex justify-center items-center gap-2">
                <i class="fa-solid fa-circle text-[12px] text-[#00A96E]"></i
                ><span class="font-medium">Open</span>
              </p>
              <p class="flex justify-center items-center gap-2">
                <i class="fa-solid fa-circle text-[12px] text-[#A855F7]"></i
                ><span class="font-medium">Closed</span>
              </p>
            </div>
          </div>
          <!-- divider -->
          <hr class="-mx-6 border-gray-200 mb-2" />
          <!-- issue container -->
          <div id="issue-container" class="grid grid-cols-3 gap-3">
            
            <!-- <div class="space-y-3 p-4 rounded-lg shadow-md border-t-3 border-green-600">

      </section>
    </main>
