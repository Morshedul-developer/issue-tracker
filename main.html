<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GitHub IT Dashboard</title>
    <!-- tailwind + daisyui -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- font awesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />

    <!-- font -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap"
      rel="stylesheet"
    />

    <style>
      * {
        font-family: "Geist", sans-serif;
      }
    </style>
  </head>
  <body>
    <!-- navbar -->
    <header class="border-b border-gray-300 sticky top-0 z-50">
      <div
        class="navbar flex-col gap-4  md:flex-row justify-between bg-base-100 sm:w-11/12 mx-auto"
      >
        <div class="flex justify-center items-center gap-1">
          <img class="w-9" src="./assets/github-logo.png" alt="" />
          <span class="text-2xl font-semibold">GitHub Issues Tracker</span>
        </div>
        <div class="flex gap-4">
          <label class="input">
            <svg
              class="h-[1em] opacity-50"
              xmlns="http://www.w3.org/2000/svg"
              viewBox="0 0 24 24"
            >
              <g
                stroke-linejoin="round"
                stroke-linecap="round"
                stroke-width="2.5"
                fill="none"
                stroke="currentColor"
              >
                <circle cx="11" cy="11" r="8"></circle>
                <path d="m21 21-4.3-4.3"></path>
              </g>
            </svg>
            <input
              id="search-input"
              type="search"
              required
              placeholder="Search issues..."
            />
          </label>
          <button
            id="search-btn"
            class="btn px-6 py-2.5 text-sm font-medium rounded-sm min-w-[100px] text-white bg-linear-to-r from-purple-600 to-indigo-500 hover:from-purple-700 hover:to-indigo-600 shadow-md hover:shadow-lg transition-all duration-200"
          >
            <i class="fa-brands fa-sistrix"></i>Search
          </button>
        </div>
      </div>
    </header>
    <!-- main section -->
    <main class="bg-[#F8FAFC] py-7 lg:py-15">
      <section class="max-w-[1110px] mx-auto">
        <!-- tabs -->
        <div
          class="p-6 bg-white rounded-lg flex gap-2 justify-center sm:justify-start mb-4 shadow"
        >
          <button
            onclick="showCategory('all')"
            id="btn-all"
            class="btn btn-tab"
          >
            All
          </button>

          <button
            onclick="showCategory('open')"
            id="btn-open"
            class="btn btn-tab"
          >
            Open
          </button>

          <button
            onclick="showCategory('closed')"
            id="btn-closed"
            class="btn btn-tab"
          >
            Closed
          </button>
        </div>
        <!-- spinner -->
        <div id="spinner" class="justify-center items-center py-4 hidden">
          <span class="loading loading-bars loading-xl"></span>
        </div>
        <!-- issues section -->
        <div class="card card-body bg-white shadow">
          <!-- issues des -->
          <div class="flex flex-col gap-3 sm:flex-row justify-between mb-5">
            <!-- left -->
            <div class="flex justify-center items-center gap-2">
              <div
                class="w-[50px] h-[50px] bg-[#ECE4FF] flex justify-center items-center rounded-full"
              >
                <img src="./assets/Aperture.png" alt="" />
              </div>
              <div>
                <h3 class="text-[20px] font-semibold">
                  <span id="total"></span> Issues
                </h3>
                <p class="text-gray-500">
                  Track and manage your project issues
                </p>
              </div>
            </div>
            <!-- right -->
            <div class="flex gap-4">
              <p class="flex justify-center items-center gap-2">
                <i class="fa-solid fa-circle text-[12px] text-[#00A96E]"></i
                ><span class="font-medium">Open</span>
              </p>
              <p class="flex justify-center items-center gap-2">
                <i class="fa-solid fa-circle text-[12px] text-[#A855F7]"></i
                ><span class="font-medium">Closed</span>
              </p>
            </div>
          </div>
          <!-- divider -->
          <hr class="-mx-6 border-gray-200 mb-4" />
          <!-- issue container -->
          <div
            id="issue-container"
            class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-3"
          ></div>
        </div>
      </section>

      <!-- modal -->
      <dialog
        id="issue-details-modal"
        class="modal modal-bottom sm:modal-middle"
      >
        <div class="modal-box">
          <div id="modal-container" class="space-y-6"></div>
          <div class="modal-action">
            <form method="dialog">
              <!-- if there is a button in form, it will close the modal -->
              <button class="btn btn-primary">Close</button>
            </form>
          </div>
        </div>
      </dialog>
    </main>

    <!-- script -->
    <script src="./script/main.js"></script>
  </body>
</html>
