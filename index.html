<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GitHub Issues Tracker</title>

    <!-- tailwind + daisyui -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- font awesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />

    <!-- font -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap"
      rel="stylesheet"
    />

    <style>
      * {
        font-family: "Geist", sans-serif;
      }
    </style>
  </head>
  <body>
    <main class="bg-[#F8FAFC] py-10">
      <section class="max-w-[520px] mx-auto h-full card card-body shadow-xl bg-white space-y-5">
        <!-- logo -->
        <div class="flex flex-col justify-center items-center">
          <img class="mb-6" src="./assets/github-logo.png" alt="" />
          <h2 class="text-2xl font-semibold">GitHub Issues Tracker</h2>
          <p class="text-gray-500">Sign in to manage your issues</p>
        </div>
        <!-- login form -->
        <fieldset class="fieldset px-4 py-0">
          <label class="text-[14px] font-medium">Username</label>
          <input
          id="username-input"
            type="text"
            class="input w-full"
            placeholder="Enter Username"
          />
          <p class="text-blue-700 mb-2">Default: admin</p>

          <label class="text-[14px] font-medium">Password</label>
          <input
          id="password-input"
            type="password"
            class="input w-full"
            placeholder="Enter Password"
          />
          <p class="text-blue-700">Default: admin123</p>

          <button id="login-btn" class="btn btn-primary rounded-lg mt-3">Sign In</button>
        </fieldset>
        <!-- divider -->
        <div class="flex w-full flex-col">
          <div class="divider px-4 my-0">OR</div>
        </div>
        <!-- demo -->
        <div class="text-center px-4">
          <p class="text-[12px] text-gray-500 mb-2">Demo Credentials:</p>
          <div class="bg-[#F8FAFC] py-6 rounded-lg">
            <p><span class="font-semibold">Username:</span> admin</p>
            <p><span class="font-semibold">Password:</span> admin123</p>
          </div>
        </div>
      </section>
    </main>

    <!-- script -->
    <script src="./script/login.js"></script>
  </body>
</html>
